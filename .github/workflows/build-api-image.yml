name: Build and Push API Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'package*.json'
      - 'turbo.json'
      - '.github/workflows/build-api-image.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and Build
        run: |
          npm ci --legacy-peer-deps
          npm run build --workspace=@finaudit/api

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/finaudit-api:latest
            ${{ secrets.DOCKER_USERNAME }}/finaudit-api:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/finaudit-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/finaudit-api:buildcache,mode=max

      - name: Trigger Render redeploy
        run: |
          curl -X POST https://api.render.com/v1/services/srv-d8hkro3tqb8s73a73q10/deploys \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}'
