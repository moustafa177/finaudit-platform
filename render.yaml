services:
  # ============================================
  # NestJS API Service
  # ============================================
  - type: web
    name: finaudit-api
    env: node
    plan: starter
    buildCommand: >
      cd apps/api &&
      npm install --legacy-peer-deps &&
      npm run build
    startCommand: >
      cd apps/api &&
      node -r tsconfig-paths/register dist/src/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 3001
      - key: API_PREFIX
        value: api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: finaudit-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: ZATCA_ENV
        value: sandbox
      - key: ANTHROPIC_API_KEY
        sync: false

  # ============================================
  # Next.js Frontend Service
  # ============================================
  - type: web
    name: finaudit-web
    env: node
    plan: starter
    buildCommand: >
      cd apps/web &&
      npm install --legacy-peer-deps &&
      npm run build
    startCommand: >
      cd apps/web &&
      npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://finaudit-api.onrender.com/api/v1
      - key: NEXT_PUBLIC_APP_URL
        value: https://finaudit-web.onrender.com

  # ============================================
  # PostgreSQL Database
  # ============================================
  - type: pserv
    name: finaudit-db
    ipAllowList: []
    plan: starter
    postgresVersion: 16
    databaseName: finaudit_db
    user: finaudit_user

